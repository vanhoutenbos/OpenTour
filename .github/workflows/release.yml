name: Release

on:
  push:
    branches: [main]

jobs:
  # Cloudflare Worker deploy — tijdelijk uitgeschakeld (geen token)
  # deploy-worker:
  #   ...

  db-migrate:
    name: Database Migraties
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: |
          supabase link \
            --project-ref ygewcjsrpewwhiqgcmyn \
            --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Repareer migratie historie (remote → local sync)
        run: |
          supabase migration repair --status applied \
            20260621161215 \
            20260621193244 \
            20260621193255 \
            20260621193318 \
            20260621193343 \
            20260621193434
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Push nieuwe migraties
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
